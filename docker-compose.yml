services:

  web:
    build: .
    container_name: django_web
    user: "1000:1000"
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --access-logfile - --error-logfile - --worker-tmp-dir /tmp --control-socket /tmp/gunicorn.sock"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always


  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always


  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always


  celery:
    build: .
    container_name: celery_worker
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.local
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always


  celery-beat:
    build: .
    container_name: celery_beat
    command: sh -c "sleep 10 && celery -A config beat -l info"
    volumes:
      - .:/app
    env_file:
      - .env.local
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always


volumes:
  pgdata: